# wisp config example. The binary refuses to start without --config.
# Metric contract (OTLP): wisp → coral → amber. Design docs live in the private vault.

agent:
  log_level: info
  self_metrics:
    # Prometheus /metrics plus Gyre /healthz, /readyz, and /status.
    endpoint: "0.0.0.0:9090"

sources:
  # Bounded Linux host metrics. Empty collectors means all available.
  host:
    interval: 15s
    collectors: [cpu, memory, network, socket, load, disk, filesystem, cgroup, uptime, pressure, uname]
    # For a containerized agent, use read-only host mounts:
    # procfs_path: /host/proc
    # sysfs_path: /host/sys
    # rootfs_path: /host/root
    # cgroupfs_path: /host/sys/fs/cgroup
    # Hostname, OS, and architecture fill only missing resource attributes.
    # Stable machine-id is privacy-sensitive and remains opt-in.
    # resource_detection:
    #   enabled: true
    #   host_id: false

  # Prometheus/OpenMetrics pull scraping: static targets and/or file_sd.
  # scrape:
  #   interval: 30s
  #   targets:
  #     - job: app
  #       static: ["127.0.0.1:8080"]
  #   file_sd:
  #     - files: ["/etc/wisp/targets/*.json"] # Prometheus file_sd JSON
  #   dns_sd:                                  # DNS service discovery
  #     - job: node
  #       names: ["_metrics._tcp.svc.cluster.local"]
  #       type: srv                            # SRV gives host+port
  #     - job: app
  #       names: ["app.svc.cluster.local"]
  #       type: a                              # A/AAAA need an explicit port
  #       port: 8080
  #   kubernetes_sd:                           # in-cluster pod discovery (no client-go)
  #     - job: pods
  #       namespace: ""                        # empty = all namespaces
  #       port: 8080                           # fallback; prometheus.io/port wins
  #       # pods opt in via prometheus.io/scrape: "true"; targets carry
  #       # __meta_kubernetes_* labels for relabel

  # Receive OTLP metrics, logs, and traces from apps (local gateway/sidecar).
  # otlp:
  #   grpc: "0.0.0.0:4317"
  #   http: "0.0.0.0:4318"
  #   # Without TLS, a non-loopback/wildcard listener additionally requires:
  #   # insecure: true
  #   tls:                       # secure the receiver (mTLS when client_ca_file set)
  #     enabled: true
  #     cert_file: /etc/wisp/server.crt
  #     key_file: /etc/wisp/server.key
  #     client_ca_file: /etc/wisp/ca.crt   # require+verify client certs (mTLS)
  #     min_version: "1.3"
  #   auth:
  #     bearer:                             # Reef named credentials
  #       - name: app-sdk
  #         token_env: WISP_INGEST_KEY      # also: token_file or token
  #   # Bearer over plaintext is rejected even on loopback. Emergency/dev-only:
  #   # danger_allow_bearer_over_plaintext: true
  #   traces:
  #     validation: report              # off | report (default) | reject
  #     sampling:                       # absent = lossless (default)
  #       mode: hash_seed
  #       sampling_percentage: 10
  #       hash_seed: 42                 # keep identical across one Wisp tier
  #     resource:                       # explicit; never inherits Wisp's resource
  #       conflict: preserve            # preserve | replace | reject
  #       attributes:
  #         deployment.environment.name: production
  #         service.namespace: shop

  # Tail newline-delimited application logs with durable checkpoints.
  # filelog:
  #   include: ["/var/log/my-app/*.log"]
  #   exclude: ["/var/log/my-app/*.gz"]
  #   checkpoint_file: "/var/lib/wisp/filelog-checkpoints.json"
  #   poll_interval: 1s
  #   start_at: end                    # beginning | end for first discovery
  #   format: text                     # text (default) | cri
  #   max_line_bytes: 262144
  #   max_batch_bytes: 524288
  #   max_read_bytes_per_poll: 4194304
  #   redaction:                       # applied before OTLP/spool durability
  #     patterns:
  #       - '(?i)authorization:\s*bearer\s+\S+'
  #       - 'token=[^&\s]+'
  #     replacement: '[REDACTED]'      # literal; this is the default
  #   multiline:                       # text format only; joins stack traces
  #     start_pattern: '^\d{4}-\d{2}-\d{2}T'
  #     max_lines: 256
  #     flush_after: 5s
  #   timestamp:                       # text format only; exactly one capture
  #     pattern: '^(\S+)'
  #     format: rfc3339nano             # rfc3339 | unix[_ms|_us|_ns]
  #
  # Kubernetes CRI logs: use the real pod files for rotation recovery, not
  # the symlinks under /var/log/containers.
  # filelog:
  #   include: ["/var/log/pods/*/*/*.log"]
  #   exclude: ["/var/log/pods/*/*/*.gz"]
  #   checkpoint_file: "/var/lib/wisp/filelog-checkpoints.json"
  #   format: cri
  #   kubernetes:
  #     pod_logs_root: /var/log/pods # change when kubelet podLogsDir is mounted elsewhere
  #     api:                         # optional, in-cluster and fail-open at runtime
  #       timeout: 2s
  #       cache_ttl: 5m
  #       stale_after: 1h
  #       failure_retry: 30s
  #       max_pods: 10000
  #       workers: 2
  #       labels:                    # strict allowlist; annotations are not copied
  #         - app.kubernetes.io/name
  #         - app.kubernetes.io/version

  # Read systemd journal entries through binary-safe Journal Export Format.
  # journald:
  #   checkpoint_file: "/var/lib/wisp/journald-checkpoint.json"
  #   poll_interval: 1s
  #   timeout: 10s
  #   start_at: end                    # beginning | end for a new checkpoint
  #   # directory: /host/var/log/journal # optional read-only mounted journals
  #   units: [checkout.service]        # optional journalctl --unit filters
  #   identifiers: [checkout-worker]   # optional SYSLOG_IDENTIFIER filters
  #   max_entries_per_poll: 512
  #   max_field_bytes: 262144          # oversized MESSAGE is marked and omitted
  #   max_batch_bytes: 524288
  #   redaction:                       # MESSAGE only, before OTLP/spool
  #     patterns:
  #       - '(?i)authorization:\s*bearer\s+\S+'
  #       - 'token=[^&\s]+'
  #     replacement: '[REDACTED]'

  # Kernel-side RED/L7 metrics without instrumenting the app. Linux-only, CAP_BPF.
  # ebpf:
  #   probes: [http, grpc]

processors:
  # Edge relabeling: keep/drop/replace/labeldrop/labelkeep (Prometheus subset).
  - type: relabel
    rules:
      - source_labels: [__name__]
        regex: "go_gc_.*"
        action: drop
  # relabel can act on discovery meta labels (e.g. keep only SRV-discovered
  # targets), then __meta_* labels are stripped before export automatically.
  # Normalize counter resets so amber's rate() stays correct across restarts.
  - type: reset
  # Edge cardinality budget per target.
  - type: cardinality_limit
    max_series_per_target: 100000

exporter:
  otlp:
    endpoint: "127.0.0.1:4317" # collector OTLP gRPC (or amber directly in v0)
    protocol: grpc
    timeout: 5s
    max_log_request_bytes: 3145728 # split logs below common 4 MiB receiver limits
    max_trace_request_bytes: 3145728 # batch complete traces; never split one trace
    # tls:                      # verify the collector; supply a client cert for mTLS
    #   enabled: true
    #   ca_file: /etc/wisp/ca.crt
    #   cert_file: /etc/wisp/client.crt   # client cert (mTLS)
    #   key_file: /etc/wisp/client.key
    # auth:                     # Reef injects Authorization over HTTP and gRPC
    #   token_env: WISP_EGRESS_KEY         # also: token_file or token
    # # For non-loopback plaintext set insecure: true. Bearer over plaintext
    # # additionally requires danger_allow_bearer_over_plaintext: true.
    # headers:                  # additional headers; values are never logged
    #   x-tenant: production
    retry:
      max_attempts: 5
      initial_backoff: 200ms
      max_backoff: 10s
  spool:
    dir: "./wisp-spool"
    max_bytes: 536870912 # 512 MiB on-disk buffer for collector/amber downtime
    max_age: 6h # drop spooled batches older than this (stale data isn't worth keeping)
    signal_limits:
      metrics:
        max_bytes: 268435456
      logs:
        max_bytes: 268435456
      traces:
        max_bytes: 134217728
    # Backpressure: when the spool passes ~80% of max_bytes, wisp sheds at the
    # source — pull scrapes are skipped, file/journald reading pauses, and the
    # OTLP receiver returns 429 / RESOURCE_EXHAUSTED — then releases below ~50%.

resource:
  attributes:
    service.name: "wisp" # required by the contract
    # host.name, k8s.* are auto-detected / injected in later phases
