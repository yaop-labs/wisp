name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.26.5"
  GOTOOLCHAIN: local

jobs:
  release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Verify tag
        run: |
          [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]

      - name: Test
        run: go test ./... -race -count=1 -timeout=10m

      - name: Build Linux artifacts
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            GOOS=linux GOARCH="$arch" CGO_ENABLED=0 \
              go build -trimpath \
              -ldflags="-s -w -X github.com/yaop-labs/wisp/internal/buildinfo.Version=$VERSION -X github.com/yaop-labs/wisp/internal/buildinfo.Commit=$COMMIT -X github.com/yaop-labs/wisp/internal/buildinfo.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o "dist/wisp_${VERSION}_linux_${arch}" ./cmd/wisp
          done
          (cd dist && sha256sum wisp_* > checksums.txt)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --verify-tag --generate-notes
